id: collared_report
requirements:
  - name: ecoscope-platform
    version: ">=2.15.0, <2.16.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.1.0rc14.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.0rc1.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-lion-guardians
    version: "0.0.0rc1.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
    
  - name: pydeck
    version: 0.9.2
    channel: conda-forge

  - name: opentelemetry-sdk
    version: ">=1.20.0,<2.0.0"
    channel: conda-forge

rjsf-overrides:
  $defs:
    ValueGrouper.properties.index_name.oneOf:
      - const: subject_name
        title: Subject Name

      - const: subject_sex 
        title: Subject Sex

      - const: subject_subtype
        title: Subject Subtype

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped
      
workflow:
  #Set workflow details
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details

  #Enter time range 
  - name: Define Time Range
    id: time_range
    task: set_time_range

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  #Set groupers
  - name: Set Groupers
    id: groupers
    task: set_groupers
    partial: 
      groupers: 
        - index_name: subject_name 

  #connect to ER 
  - name: Connect to EarthRanger 
    id: er_client_name
    task: set_er_connection

  # Set base maps
  - name: Base Maps
    id: base_map_defs
    task: set_base_maps_pydeck
    partial: 
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 15

        - url: >-
            https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
          opacity: 0.15
          max_zoom: 15

  - name: Area of Interest from ER 
    id: select_geo_er 
    task: ecoscope_workflows_ext_ste.tasks.spatial_operations.get_spatial_features
    partial:
      client: ${{ workflow.er_client_name.return }}
      layers:
        - query:
            feature_type: "Conservancies"
          style:
            - polygon:
                - fill_color: ["#8fbc8b"] #"#3388FF"
                  stroke_color: "#8fbc8b"
                  fill_opacity: 0.75
                  stroke_width: 1.75
          group_by: "type_name"
          legend_title: "Map Layers"

        - query:
            feature_type: "Group Ranch Boundaries"
          style:
            - polygon:
                - fill_opacity: 0
                  stroke_color: "#000000"
                  stroke_width: 1.25

          group_by: "type_name"
          legend_title: ""

        # - query:
        #     featureset_name: "Boundaries"
        #   style: []
        #   group_by: "type_name"
        #   legend_title: "Boundaries"


  - name: Build Study Area Map Layer
    id: spatial_features_layer
    task: ecoscope_workflows_ext_ste.tasks.results.create_spatial_features_layer
    partial:
      geodataframes: ${{ workflow.select_geo_er.return }}

  - name: Download cover page 
    id: persist_cover_page
    task: ecoscope_workflows_ext_ste.tasks.io.fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/kyjd9ii9nul1osbkezl5w/collared_lions_cover_page.docx?rlkey=4nl68thyqzd0n49wnr1770u0x&st=fnpsvt9i&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Download collared page
    id: persist_indv_subject_page
    task: ecoscope_workflows_ext_ste.tasks.io.fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/v69q5ja7whtb033adq829/collared_lion_subject_template.docx?rlkey=zaf9iknc61zukii4xzwwwuu6o&st=1gj1vbk3&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  #Get subject group observations
  - name: Get Subject Group observations from EarthRanger
    id: subject_obs
    task: get_subjectgroup_observations
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      raise_on_empty: false
      include_details: false
      include_subjectsource_details: false
      filter: clean
  
  - name: Convert relocs to timezone
    id: convert_relocs_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.subject_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - fixtime

  #Process relocations 
  - name: Transform observations to relocations
    id: subject_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.convert_relocs_timezone.return }}
      relocs_columns:
        - groupby_col
        - fixtime
        - junk_status
        - geometry
        - extra__subject__name
        - extra__subject__subject_subtype
        - extra__subject__sex
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Persist relocations 
    id: persist_relocs
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: geoparquet 
      filename: relocations
      df: ${{ workflow.subject_reloc.return }}

  # Convert Relocs to Trajectories
  - name: Transform relocations to trajectories
    id: subject_traj
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.subject_reloc.return }}
      trajectory_segment_filter: 
        min_length_meters: 10
        max_length_meters: 10000
        min_time_secs: 10
        max_time_secs: 21600
        min_speed_kmhr: 1
        max_speed_kmhr: 30

  - name: Persist trajectories 
    id: persist_trajs
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: geoparquet 
      filename: trajectories
      df: ${{ workflow.subject_traj.return }}

  # Add temporal index
  - name: Add temporal index to Subject Trajectories
    id: traj_add_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.subject_traj.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Classify trajectories by speed 
    id: classify_trajectories_speed_bins 
    task: apply_classification 
    partial: 
      df: ${{ workflow.traj_add_temporal_index.return }}
      input_column_name: speed_kmhr
      output_column_name: speed_bins
      classification_options: 
        scheme: equal_interval 
        k: 6 
      label_options: 
        label_range: false 
        label_decimals: 1 

  # rename trajectory columns
  - name: Rename trajectory columnns
    id: rename_traj_cols
    task: map_columns
    partial:
      raise_if_not_found: true
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__name: subject_name
        extra__sex: subject_sex
        extra__subject_subtype: subject_subtype

      df: ${{ workflow.classify_trajectories_speed_bins.return }}

  # Split subjects trajectories by group
  - name: Split subject trajectories by group
    id: split_subject_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.rename_traj_cols.return }}
      groupers: ${{ workflow.groupers.return }}

  - title: Get subject name and use them to persist files with it 
    type: task-group
    description: Choose a grouper to extract subject names for file naming. This will help in organizing the output files based on individual subjects. 
    tasks:
      - name: Get first subject name for filenames
        id: unique_subject_name
        task: column_first_unique_value
        partial:
          column_name: subject_name
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_subject_traj_groups.return }}

      - name: Safe-string subject name for filenames
        id: safe_subject_name
        task: ecoscope_workflows_ext_ste.tasks.transformation.safe_string
        mapvalues:
          argnames: value
          argvalues: ${{ workflow.unique_subject_name.return }}

      - name: Build tracks filename 
        id: tracks_filename 
        task: prefix_string_var
        partial: 
          var: _tracks.html 
        mapvalues:
          argnames: prefix 
          argvalues: ${{ workflow.safe_subject_name.return }}

      - name: Build homerange filename 
        id: hr_filename 
        task: prefix_string_var
        partial: 
          var: _homerange.html 
        mapvalues:
          argnames: prefix 
          argvalues: ${{ workflow.safe_subject_name.return }}

  - title: Map Zoom & Extent
    type: task-group
    description: Calculate the geographic extent of the movement tracks and determine an appropriate zoom level and center point for the map. This ensures that all tracks are visible and well-framed when the map is rendered.
    tasks:
      - name: null
        id: zoom_to_envelope 
        task: ecoscope_workflows_ext_ste.tasks.spatial_operations.envelope_gdf
        # partial:
        #   expansion_factor: 1.05
        mapvalues: 
          argnames: gdf 
          argvalues:  ${{ workflow.split_subject_traj_groups.return }}
  
      - name: Zoom view to gdf extent
        id: gdf_image_extent
        task: ecoscope_workflows_ext_ste.tasks.spatial_operations.compute_view_state_from_gdf
        partial:
          pitch: 0
          bearing: 0
          max_zoom: 15
        mapvalues:
          argnames: gdf
          argvalues: ${{ workflow.zoom_to_envelope.return }}


  # Calculate Time Density
  - title: Time density map
    type: task-group
    description: These settings show a grid-based heatmap showing where subjects spent the most time.
    tasks:
      #calculate time density for individual subjects
      - name: null
        id: td
        task: calculate_elliptical_time_density
        partial:
          crs: ESRI:53042
          percentiles:
            - 50.000000
            - 60.000000
            - 70.000000
            - 80.000000
            - 90.000000
            - 95.000000
            - 99.000000
          nodata_value: nan
          band_count: 1
        mapvalues:
          argnames: trajectory_gdf
          argvalues: ${{ workflow.split_subject_traj_groups.return }}

        #time density colormap -adopting subject tracks approach for now 
      - name: Time density colormap
        id: td_colormap
        task: apply_color_map
        partial:
          input_column_name: percentile
          colormap: RdYlGn
          output_column_name: percentile_colormap
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.td.return }}
      
      # create polygon layer
      - name: Create map layer from time density
        id: td_map_layer
        task: ecoscope_workflows_ext_custom.tasks.results.create_geojson_layer
        partial:
          data_url: null 
          layer_style:
            filled: true 
            stroked: true 
            extruded: false 
            wireframe: false 
            get_fill_color: percentile_colormap
            get_line_color: percentile_colormap 
            opacity: 0.45
            get_line_width: 1.55
            get_elevation: 0 
            get_point_radius: 1 
            line_width_units: pixels 
            line_width_scale: 1 
            line_width_min_pixels: 1 
            line_width_max_pixels: 5 

          legend:
            title: Home Range Percentiles
            label_column: percentile
            color_column: percentile_colormap
            sort: ascending
            label_suffix: null
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.td_colormap.return }}
      
        # Combine layers ie static and grouped
      - name: Combine er map layers with home range layers
        id: combine_hr_map_layers
        task: ecoscope_workflows_ext_ste.tasks.spatial_operations.combine_deckgl_map_layers
        partial:
          static_layers: ${{ workflow.spatial_features_layer.return }}
        mapvalues:
          argnames: grouped_layers
          argvalues: ${{ workflow.td_map_layer.return }}

      - name: Combine home range layers with view state
        id: zip_hr_with_viewstate
        skipif:
          conditions:
            - any_dependency_skipped
            - any_keyed_iterables_are_skips
          unpack_depth: 1
        task: groupbykey
        partial:
          iterables:
            - ${{ workflow.combine_hr_map_layers.return }}
            - ${{ workflow.gdf_image_extent.return }}

      - name: Draw ecomap from time density
        id: td_ecomap
        task: ecoscope_workflows_ext_custom.tasks.results.draw_map
        partial:
          tile_layers: ${{ workflow.base_map_defs.return }}
          static: false
          title: null
          max_zoom: 15
          legend_style:
            placement: "bottom-right"
            title: "ETD Metrics"
        mapvalues:
          argnames:
            - geo_layers
            - view_state
          argvalues: ${{ workflow.zip_hr_with_viewstate.return }}

      #Persist ecomaps   
      - name: Combine homerange filename with text
        id: hr_text
        skipif:
          conditions:
            - any_dependency_skipped
            - any_keyed_iterables_are_skips
          unpack_depth: 1
        task: groupbykey
        partial:
          iterables:
            - ${{ workflow.hr_filename.return }}
            - ${{ workflow.td_ecomap.return }}

      - name: Persist ecomap as text
        id: td_ecomap_html_url
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: null
        mapvalues:
          argnames: 
            - filename 
            - text
          argvalues: ${{ workflow.hr_text.return }}

      - name: Create time density map widget
        id: td_map_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Home Range Metrics
        map:
          argnames:
            - view
            - data
          argvalues: ${{ workflow.td_ecomap_html_url.return }}

      - name: Merge Time Density Map Widget Views
        id: td_grouped_map_widget
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.td_map_widget.return }}
  
  - name: Generate summary table metrics for subjects
    id: summary_table
    task: summarize_df
    partial:
      groupby_cols:
        - subject_name
      summary_params: 
        - display_name: mean_speed
          aggregator: mean
          column: speed_kmhr
          decimal_places: 2

        - display_name: min_speed
          aggregator: min
          column: speed_kmhr
          decimal_places: 2

        - display_name: max_speed
          aggregator: max
          column: speed_kmhr
          decimal_places: 2
        
        - display_name: total_distance
          aggregator: sum 
          column: dist_meters
          original_unit: m
          new_unit: km
          decimal_places: 2

      reset_index: true 
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}

  - name: Persist summary table
    id: persist_summary_table
    task: persist_df 
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: null
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.summary_table.return }}

  # convert html to png 
  - name: Convert collared subject html to png
    id: collared_html_png 
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.td_ecomap_html_url.return }}

  # Subject tracks
  - name: Generate track layers 
    id: generate_track_layers 
    task: ecoscope_workflows_ext_custom.tasks.results.create_path_layer
    partial: 
      data_url: null
      layer_style:
        get_color: [30, 144, 255]
        get_width: 1.25
        width_scale: 1 
        width_min_pixels: 2 
        width_max_pixels: 8 
        width_units: pixels
        cap_rounded: true 
        joint_rounded: true
        billboard: false
        opacity: 0.45
        stroked: true 
      legend:
        title: Subject Tracks 
        values: 
          - label: Tracks 
            color: "#1e90ff"
    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.split_subject_traj_groups.return }} 
  
    # Combine layers ie static and grouped
  - name: Combine map layers
    id: combine_track_layers
    task: ecoscope_workflows_ext_ste.tasks.spatial_operations.combine_deckgl_map_layers
    partial:
      static_layers: ${{ workflow.spatial_features_layer.return }}
    mapvalues:
      argnames: grouped_layers
      argvalues: ${{ workflow.generate_track_layers.return }}

  - name: Combine movement track layers with view state
    id: zip_tracks_viewstate
    skipif:
      conditions:
        - any_dependency_skipped
        - any_keyed_iterables_are_skips
      unpack_depth: 1
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.combine_track_layers.return }}
        - ${{ workflow.gdf_image_extent.return }}

  - name: Draw track map
    id: draw_track_map
    task: ecoscope_workflows_ext_custom.tasks.results.draw_map
    partial:
      tile_layers: ${{ workflow.base_map_defs.return }}
      static: false
      title: null
      max_zoom: 15
      legend_style:
        placement: "bottom-right"
    mapvalues:
      argnames:
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_tracks_viewstate.return }}

  - name: Combine movement tracks filename with text
    id: movement_text
    skipif:
      conditions:
        - any_dependency_skipped
        - any_keyed_iterables_are_skips
      unpack_depth: 1
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.tracks_filename.return }}
        - ${{ workflow.draw_track_map.return }}

  - name: Persist tracks as text
    id: track_html_url
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: tracks
    mapvalues:
      argnames: 
        - filename
        - text
      argvalues: ${{ workflow.movement_text.return }}

  # convert html to png 
  - name: Convert track html to png
    id: track_html_png 
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.track_html_url.return }}

  - name: Create trackmap widget
    id: trackmap_widget
    task: create_map_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Subject Tracks
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.track_html_url.return }}

  - name: Merge trackmap widget view
    id: sm_grouped_map_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.trackmap_widget.return }}

  # Metric summary widgets 
  - name: Calculate mean speed 
    id: calc_mean_speed
    task: dataframe_column_sum
    partial:
      column_name: mean_speed
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.summary_table.return }}

  - name: Round off mean speed to 2 decimal_places
    id: round_mean_speed
    task: ecoscope_workflows_ext_ste.tasks.transformation.round_off_values
    partial:
      dp: 2
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.calc_mean_speed.return }}

  - name: Calculate min speed 
    id: calc_min_speed
    task: dataframe_column_sum
    partial:
      column_name: min_speed
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.summary_table.return }}

  - name: Round off min speed to 2 decimal_places
    id: round_min_speed
    task: ecoscope_workflows_ext_ste.tasks.transformation.round_off_values
    partial:
      dp: 2
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.calc_min_speed.return }}
      
  - name: Calculate max speed 
    id: calc_max_speed
    task: dataframe_column_sum
    partial:
      column_name: max_speed
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.summary_table.return }}

  - name: Round off max speed to 2 decimal_places
    id: round_max_speed
    task: ecoscope_workflows_ext_ste.tasks.transformation.round_off_values
    partial:
      dp: 2
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.calc_max_speed.return }}

  - name: Calculate total distance
    id: total_distance_covered
    task: dataframe_column_sum
    partial:
      column_name: total_distance
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.summary_table.return }}

  - name: Round off total distance to 2 decimal_places
    id: round_total_distance
    task: ecoscope_workflows_ext_ste.tasks.transformation.round_off_values
    partial:
      dp: 2
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.total_distance_covered.return }}

  - name: Get unique subject names from trajectories
    id: unique_subjects
    task: dataframe_column_nunique
    partial:
      df: ${{ workflow.rename_traj_cols.return }}
      column_name: subject_name

  - name: Download org log path
    id: persist_logo
    task: ecoscope_workflows_ext_ste.tasks.io.fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/8oohb6i0kcj0q3qsud9l4/lion-guardians.png?rlkey=4kdqytux2qyftb5sgnaigyuyz&st=os6i6j6h&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Create cover page context
    id: create_cover_tpl_context
    task: prepare_cover_metadata
    partial:
      org_logo_path: ${{ workflow.persist_logo.return }}
      report_period: ${{ workflow.time_range.return }}
      prepared_by: "Ecoscope"
      extra_fields:
        count: ${{ workflow.unique_subjects.return }}
      time_generated_format: "%Y-%m-%d %H:%M:%S"

  - name: Persist cover page 
    id: persist_collar_cover_page
    task: create_context_page
    partial:
      template_path: ${{ workflow.persist_cover_page.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      context: ${{ workflow.create_cover_tpl_context.return }}
      filename: cover_page.docx

  # Create collared lions context 
  - name: Group collared lions context values 
    id: group_context_values 
    skipif:
      conditions:
        - any_dependency_skipped
        - any_keyed_iterables_are_skips
      unpack_depth: 1
    task: groupbykey
    partial: 
      iterables:
        - ${{ workflow.split_subject_traj_groups.return }} # df
        - ${{ workflow.round_total_distance.return }} # total distance
        - ${{ workflow.collared_html_png.return }} # home range
        - ${{ workflow.track_html_png.return }} # speed map

  - name: Create individual context
    id: build_collared_context
    task: ecoscope_workflows_ext_lion_guardians.tasks.reporting.create_collared_lions_context
    mapvalues:
      argnames:
        - df
        - total_distance 
        - home_range
        - speed_map 
      argvalues: ${{ workflow.group_context_values.return }}

  - name: Create grouper word doc
    id: create_grouper_doc
    task: ecoscope_workflows_ext_lion_guardians.tasks.reporting.render_docx_page
    partial:  
      template_path: ${{ workflow.persist_indv_subject_page.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: null
      strict_images: true
      box_h_cm: 6.5
      box_w_cm: 11.11
    mapvalues:
      argnames: context 
      argvalues: ${{ workflow.build_collared_context.return }}

  - name: Merge cover page and individual collared documents
    id: merge_collared_docs
    skipif:
      conditions:
        - any_dependency_skipped
      unpack_depth: 1
    task: merge_docx_documents
    partial: 
      cover_page_path: ${{ workflow.persist_collar_cover_page.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      context_page_items: ${{ workflow.create_grouper_doc.return }}
      filename: overall_report.docx
      order_by: name

  - name: Create single value widgets for total mean speed per group
    id: total_mean_speed_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Mean Speed 
      decimal_places: 2
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.round_mean_speed.return }}

  - name: Merge per group mean speed SV widgets
    id: total_mean_speed_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_mean_speed_widgets.return }}

  - name: Create single value Widgets for total min speed per group
    id: total_min_speed_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Min Speed 
      decimal_places: 2
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.round_min_speed.return }}

  - name: Merge per group min speed SV widgets
    id: total_min_speed_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_min_speed_widgets.return }}

  - name: Create single value widgets for total max speed per group
    id: total_max_speed_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Max Speed 
      decimal_places: 2
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.round_max_speed.return }}

  - name: Merge per group max speed SV widgets
    id: total_max_speed_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_max_speed_widgets.return }}

  - name: Create single value widgets for total distance per group
    id: total_distance_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Distance covered
      decimal_places: 2
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.round_total_distance.return }}

  - name: Merge per group total distance SV widgets
    id: total_distance_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_distance_widgets.return }}

  - name: Lion Guardians dashboard
    id: lg_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets:
        - ${{ workflow.total_mean_speed_sv_widget.return }}
        - ${{ workflow.total_min_speed_sv_widget.return }}
        - ${{ workflow.total_max_speed_sv_widget.return }}
        - ${{ workflow.total_distance_sv_widget.return }}
        
        - ${{ workflow.td_grouped_map_widget.return }}
        - ${{ workflow.sm_grouped_map_widget.return }}

      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}